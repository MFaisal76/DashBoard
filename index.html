<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USDT EGP</title>
  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid lime;
      border-radius: 14px;
      padding: 20px;
      max-width: 420px;
      margin: 20px auto;
      box-shadow: 0 0 20px rgba(0,255,0,0.2);
    }

    .price {
      font-size: 38px;
      font-weight: bold;
      margin: 12px 0;
    }

    .change {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .updated {
      font-size: 14px;
      color: #9cff9c;
    }

    button {
      background: lime;
      color: black;
      padding: 10px 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h1>🪙 USDT/EGP Smart Selector</h1>

  <div class="card">
    <div>Live USDT Price in EGP</div>
    <div id="price" class="price">Loading...</div>
    <div id="change" class="change"></div>
    <div id="updated" class="updated"></div>
    <button onclick="loadPrice()">Refresh</button>
  </div>

  <script>
    async function loadPrice() {
      const priceEl = document.getElementById("price");
      const changeEl = document.getElementById("change");
      const updatedEl = document.getElementById("updated");

      priceEl.textContent = "Loading...";
      changeEl.textContent = "";
      updatedEl.textContent = "";

      try {
        const res = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=egp&include_24hr_change=true"
        );
        const data = await res.json();

        const price = data.tether.egp;
        const change = data.tether.egp_24h_change;

        priceEl.textContent = price.toFixed(2) + " EGP";

        if (typeof change === "number") {
          changeEl.textContent = "24h Change: " + change.toFixed(2) + "%";
          changeEl.style.color = change >= 0 ? "lime" : "red";
        }

        updatedEl.textContent = "Updated: " + new Date().toLocaleString();
      } catch (err) {
        priceEl.textContent = "Failed to load price";
        changeEl.textContent = "";
        updatedEl.textContent = "";
      }
    }

    loadPrice();
    setInterval(loadPrice, 10000);
  </script>
</body>
</html>
