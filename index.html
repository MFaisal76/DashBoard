<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USDT Selector</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #39ff14;
      font-family: monospace;
      text-align: center;
      padding: 30px;
    }
    h1 {
      font-size: 44px;
      margin-top: 40px;
      text-shadow: 0 0 12px #39ff14;
    }
    .card {
      max-width: 700px;
      margin: 40px auto;
      padding: 30px;
      border: 3px solid #7cff7c;
      border-radius: 24px;
      box-shadow: 0 0 30px #00ff66;
      background: rgba(0, 255, 100, 0.08);
    }
    .row {
      margin: 18px 0;
    }
    select, input, button {
      padding: 12px 16px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      margin: 8px;
    }
    select, input {
      background: #39ff14;
      color: #111;
      font-weight: bold;
    }
    button {
      background: #fff;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }
    .price {
      font-size: 58px;
      font-weight: bold;
      margin: 24px 0;
      text-shadow: 0 0 15px #39ff14;
    }
    .small {
      font-size: 18px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h1>🪙 USDT Smart Selector</h1>

  <div class="card">
    <div class="row">
      <label>USDT price in USD:</label><br>
      <input id="usdPrice" type="number" step="0.0001" value="1.00">
    </div>

    <div class="row">
      <label>Choose currency:</label><br>
      <select id="currency">
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
        <option value="EGP" selected>EGP</option>
      </select>
      <button onclick="showPrice()">Show</button>
    </div>

    <div id="price" class="price">Ready</div>
    <div id="info" class="small">Choose currency and press Show</div>
  </div>

  <script>

      const currency = document.getElementById("currency").value;
      const priceEl = document.getElementById("price");
      const infoEl = document.getElementById("info");

      if (currency === "USD") {
        result = usdPrice;
      } else if (currency === "EUR") {
        result = usdPrice * 0.92;
